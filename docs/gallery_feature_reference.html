<!-- GALLERY SCREEN (add after your other screens) -->
<div id="gallery-screen" class="screen">
  <div class="gallery-container">
    <div class="gallery-hero">
      <h1>✨ Community Templates</h1>
      <p>Start with a proven agent team or explore what others have built</p>
    </div>

    <div class="gallery-controls">
      <div class="gallery-search-bar">
        <span class="material-symbols-outlined">search</span>
        <input 
          type="text" 
          id="gallery-search" 
          placeholder="Search templates..." 
          oninput="filterGallery()"
        />
      </div>
      
      <div class="gallery-filters" id="gallery-filters">
        <button class="gallery-filter-btn active" data-category="all" onclick="filterByCategory('all')">
          All Templates
        </button>
        <button class="gallery-filter-btn" data-category="ecommerce" onclick="filterByCategory('ecommerce')">
          🛍️ E-commerce
        </button>
        <button class="gallery-filter-btn" data-category="data" onclick="filterByCategory('data')">
          📊 Data & Analytics
        </button>
        <button class="gallery-filter-btn" data-category="creative" onclick="filterByCategory('creative')">
          ✍️ Creative
        </button>
        <button class="gallery-filter-btn" data-category="technical" onclick="filterByCategory('technical')">
          💻 Technical
        </button>
        <button class="gallery-filter-btn" data-category="other" onclick="filterByCategory('other')">
          🔧 Other
        </button>
      </div>
    </div>

    <div class="gallery-grid" id="gallery-grid">
      <!-- Templates loaded dynamically -->
    </div>
  </div>
</div>

<!-- TEMPLATE DETAIL MODAL -->
<div class="modal-overlay" id="template-detail-overlay">
  <div class="modal template-detail-modal">
    <button class="modal-close" onclick="closeTemplateDetail()">✕</button>
    
    <div class="template-detail-header">
      <h2 id="template-detail-title"></h2>
      <div class="template-detail-meta">
        <span class="template-badge" id="template-detail-badge"></span>
        <span id="template-detail-difficulty"></span>
        <span id="template-detail-agents"></span>
      </div>
    </div>

    <p class="template-detail-description" id="template-detail-description"></p>

    <div class="template-detail-section">
      <h3>Use Cases</h3>
      <ul id="template-detail-usecases"></ul>
    </div>

    <div class="template-detail-section">
      <h3>Agent Team</h3>
      <div id="template-detail-team"></div>
    </div>

    <div class="template-detail-tags" id="template-detail-tags"></div>

    <div class="template-detail-actions">
      <button class="primary-btn" onclick="forkTemplate()">
        🔀 Use This Template
      </button>
      <button class="secondary-btn" onclick="previewTemplate()">
        👁️ Preview Agents
      </button>
    </div>
  </div>
</div>

<!-- STYLES (add to your <style> section) -->
<style>
/* Gallery Container */
.gallery-container {

/* Gallery Grid */

}

.template-card::before {
  content: '';

  top: 0;

  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0;
  transition: opacity 0.3s;
}

.template-card:hover {
  border-color: var(--accent);
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(242, 185, 13, 0.15);
}

}

.template-card-tags {

.expertise-tag {

.template-detail-actions button {

}

.primary-btn {

}

.primary-btn:hover {

}

.secondary-btn {

.secondary-btn:hover {

.gallery-empty {

  {

    agents: 3,
    featured: true,
    tags: ["copywriting", "seo", "social-media"],
    preview: "Creates SEO content, writes copy, manages social",
    useCases: [
      "Blog post writing",
      "SEO optimization",
      "Social media content",
      "Marketing campaigns"
    ],
    team: {
      "Copywriter": {
        role: "Content writer",

        personality: "Creative, persuasive",
        expertise: ["Blog", "Ad copy", "Storytelling"]
      },
      "SEO Specialist": {
        role: "SEO expert",
        description: "Optimizes for search",

      },
      "Social Media Manager": {
        role: "Social strategist",
        description: "Creates social content",
        personality: "Trendy, engaging",
        expertise: ["Social strategy", "Engagement", "Calendars"]
      }
    }
  }
];

let currentTemplates = [...FEATURED_TEMPLATES];
let selectedTemplate = null;

// Initialize gallery
function initGallery() {
  renderGalleryGrid();
}

// Render template cards
function renderGalleryGrid() {
  const grid = document.getElementById('gallery-grid');
  
  if (currentTemplates.length === 0) {
    grid.innerHTML = `
      <div class="gallery-empty" style="grid-column: 1/-1">
        <span class="material-symbols-outlined">search_off</span>
        <p>No templates found matching your criteria</p>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = currentTemplates.map(template => `
    <div class="template-card" onclick="showTemplateDetail('${template.id}')">
      <div class="template-card-header">
        ${template.featured ? '<span class="template-badge featured">Featured</span>' : ''}
      </div>
      
      <h3>${template.title}</h3>
      <p class="template-card-description">${template.description}</p>
      
      <div class="template-card-meta">
        <span>🤖 ${template.agents} agents</span>
        <span>📊 ${template.difficulty}</span>
      </div>
      
      <div class="template-card-tags">
        ${template.tags.slice(0, 3).map(tag => 
          `<span class="template-tag">${tag}</span>`
        ).join('')}
      </div>
      
      <div class="template-card-footer">
        <button class="template-use-btn" onclick="event.stopPropagation(); forkTemplateById('${template.id}')">
          Use Template →
        </button>
      </div>
    </div>
  `).join('');
}

// Filter by category
function filterByCategory(category) {
  // Update active button
  document.querySelectorAll('.gallery-filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  // Filter templates
  if (category === 'all') {
    currentTemplates = [...FEATURED_TEMPLATES];
  } else {
    currentTemplates = FEATURED_TEMPLATES.filter(t => t.category === category);
  }
  
  renderGalleryGrid();
}

// Search filter
function filterGallery() {
  const query = document.getElementById('gallery-search').value.toLowerCase();
  
  if (!query) {
    currentTemplates = [...FEATURED_TEMPLATES];
  } else {
    currentTemplates = FEATURED_TEMPLATES.filter(t =>
      t.title.toLowerCase().includes(query) ||
      t.description.toLowerCase().includes(query) ||
      t.tags.some(tag => tag.includes(query))
    );
  }
  
  renderGalleryGrid();
}

// Show template detail modal
function showTemplateDetail(templateId) {
  const template = FEATURED_TEMPLATES.find(t => t.id === templateId);
  if (!template) return;
  
  selectedTemplate = template;
  
  // Populate modal
  document.getElementById('template-detail-title').textContent = template.title;
  document.getElementById('template-detail-badge').textContent = 
    template.featured ? 'Featured' : template.category;
  document.getElementById('template-detail-badge').className = 
    `template-badge ${template.featured ? 'featured' : ''}`;
  document.getElementById('template-detail-difficulty').textContent = 
    `📊 ${template.difficulty}`;
  document.getElementById('template-detail-agents').textContent = 
    `🤖 ${template.agents} agents`;
  document.getElementById('template-detail-description').textContent = 
    template.preview;
  
  // Use cases
  const useCasesList = document.getElementById('template-detail-usecases');
  useCasesList.innerHTML = template.useCases.map(uc => 
    `<li>${uc}</li>`
  ).join('');
  
  // Team members
  const teamContainer = document.getElementById('template-detail-team');
  teamContainer.innerHTML = Object.entries(template.team).map(([name, agent]) => `
    <div class="template-agent-card">
      <h4>${name}</h4>
      <div class="template-agent-role">${agent.role}</div>
      <div class="template-agent-description">${agent.description}</div>
      <div class="template-agent-expertise">
        ${agent.expertise.map(e => `<span class="expertise-tag">${e}</span>`).join('')}
      </div>
    </div>
  `).join('');
  
  // Tags
  const tagsContainer = document.getElementById('template-detail-tags');
  tagsContainer.innerHTML = template.tags.map(tag => 
    `<span class="template-tag">${tag}</span>`
  ).join('');
  
  // Show modal
  document.getElementById('template-detail-overlay').classList.add('open');
}

// Close template detail
function closeTemplateDetail() {
  document.getElementById('template-detail-overlay').classList.remove('open');
  selectedTemplate = null;
}

// Fork template (use it)
function forkTemplate() {
  if (!selectedTemplate) return;
  forkTemplateById(selectedTemplate.id);
  closeTemplateDetail();
}

function forkTemplateById(templateId) {
  const template = FEATURED_TEMPLATES.find(t => t.id === templateId);
  if (!template) return;
  
  // TODO: Integrate with your existing agent creation flow
  // For now, show a notification
  showNotification(`✨ Template "${template.title}" loaded! Customize it to fit your needs.`, 'success');
  
  // Navigate to topic screen (or wherever your flow starts)
  showScreen('topic');
  
  // You might want to pre-populate fields based on template data
  console.log('Forked template:', template);
}

// Preview template (future feature)
function previewTemplate() {
  if (!selectedTemplate) return;
  showNotification('🎮 Preview feature coming soon! For now, fork the template to try it.', 'info');
}

// Initialize when gallery screen is shown
const _origShowScreenGallery = window.showScreen;
window.showScreen = function(name) {
  _origShowScreenGallery(name);
  if (name === 'gallery') {
    initGallery();
  }
};

// Add gallery to navigation (add button to your header or sidebar)
// You can call: showScreen('gallery')

console.log('✨ Gallery feature loaded!');
</script>
